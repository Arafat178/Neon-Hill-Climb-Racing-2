<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Hill Climb</title>
    <link rel="icon" href="data:,">
    <style>
        /* === STYLING & UI === */
        body { margin: 0; padding: 0; overflow: hidden; background-color: #080808; color: #fff; font-family: 'Segoe UI', sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: flex-start; z-index: 10; pointer-events: none; display: none; }
        #stats { display: flex; flex-direction: column; gap: 12px; }
        #fuelContainer { width: 250px; height: 20px; background: #222; border-radius: 10px; border: 2px solid #00ffcc; box-shadow: 0 0 10px #00ffcc; overflow: hidden; position: relative; }
        #fuelBar { width: 100%; height: 100%; background: #00ffcc; box-shadow: 0 0 15px #00ffcc; transition: width 0.1s linear, background-color 0.3s; }
        #fuelText { position: absolute; top: 0; left: 50%; transform: translateX(-50%); font-size: 14px; font-weight: bold; color: #fff; line-height: 20px; text-shadow: 1px 1px 2px #000; }
        
        .neon-text { font-size: 24px; font-weight: bold; color: #fff; text-shadow: 0 0 10px #00ffcc; }
        .coin-text { color: #ffeb3b; text-shadow: 0 0 10px #ffeb3b; font-size: 26px; font-weight: bold; }
        
        /* Screens */
        .overlay-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; backdrop-filter: blur(5px); }
        #startScreen { display: flex; }
        #gameOverScreen { display: none; }
        
        h1 { font-size: 50px; color: #00ffcc; text-shadow: 0 0 25px #00ffcc; margin-bottom: 5px; text-transform: uppercase; text-align: center; }
        #gameOverScreen h1 { color: #ff0055; text-shadow: 0 0 25px #ff0055; }
        p.subtitle { font-size: 18px; color: #ccc; margin-bottom: 20px; text-align: center; }
        
        input[type="text"] { padding: 10px 20px; font-size: 18px; border-radius: 25px; border: 2px solid #00ffcc; background: #111; color: #00ffcc; outline: none; margin-bottom: 15px; text-align: center; }
        button { background: transparent; color: #00ffcc; border: 2px solid #00ffcc; padding: 12px 35px; font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; margin-bottom: 15px; }
        button:hover { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; transform: scale(1.05); }

        /* Garage UI */
        #garage { background: rgba(0,0,0,0.6); border: 1px solid #ffeb3b; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; width: 300px; box-shadow: 0 0 15px rgba(255, 235, 59, 0.2); }
        #garage h3 { margin: 0 0 10px 0; color: #ffeb3b; font-size: 22px; text-shadow: 0 0 10px #ffeb3b; }
        .upg-btn { display: block; width: 100%; margin: 8px 0; padding: 10px; font-size: 16px; border-color: #ffeb3b; color: #ffeb3b; }
        .upg-btn:hover { background: #ffeb3b; color: #000; box-shadow: 0 0 15px #ffeb3b; }
        .upg-btn:disabled { border-color: #555; color: #555; cursor: not-allowed; box-shadow: none; background: transparent; }

        /* Vehicle Selection UI */
        .vehicle-select { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; }
        .veh-btn { padding: 12px 25px; border-radius: 8px; border: 2px solid #555; background: rgba(0,0,0,0.6); color: #ccc; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .veh-btn.active { border-color: #00ffcc; color: #fff; background: rgba(0, 255, 204, 0.2); box-shadow: 0 0 10px rgba(0,255,204,0.3); }

        /* Mobile Controls */
        #mobileControls { position: absolute; bottom: 20px; width: 100%; display: none; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 15; }
        .control-btn { padding: 20px; width: 90px; height: 90px; border-radius: 50%; font-size: 16px; font-weight: bold; cursor: pointer; user-select: none; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); transition: 0.1s; border: 3px solid; }
        .control-btn:active { transform: scale(0.9); }
        #btnBrake { border-color: #ff0055; color: #ff0055; box-shadow: 0 0 15px rgba(255,0,85,0.4); }
        #btnBrake:active { background: rgba(255,0,85,0.3); }
        #btnAccel { border-color: #00ffcc; color: #00ffcc; box-shadow: 0 0 15px rgba(0,255,204,0.4); }
        #btnAccel:active { background: rgba(0,255,204,0.3); }

        /* Leaderboard */
        #leaderboard { background: rgba(0,0,0,0.6); padding: 15px 30px; border-radius: 15px; border: 1px solid #00ffcc; width: 280px; max-height: 200px; overflow-y: auto; }
        #leaderboard h3 { color: #00ffcc; text-align: center; margin-top: 0; margin-bottom: 10px; font-size: 20px; text-shadow: 0 0 10px #00ffcc; }
        #leaderboardList { list-style: none; padding: 0; margin: 0; color: #fff; font-size: 14px; line-height: 1.6; }
        #leaderboardList li { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 5px 0; }
        #leaderboardList li span { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

    <div id="startScreen" class="overlay-screen">
        <h1>Neon Hill Climb Racing 2</h1>
        <input type="text" id="playerName" placeholder="Driver Name" autocomplete="off" maxlength="12">
        
        <div id="garage">
            <h3>GARAGE</h3>
            <p class="coin-text">Coins: <span id="totalCoins">0</span></p>
            <button class="upg-btn" id="btnUpgEngine" onclick="window.upgrade('engine')">Engine Lvl 1 - $50</button>
            <button class="upg-btn" id="btnUpgFuel" onclick="window.upgrade('fuel')">Fuel/Battery Lvl 1 - $50</button>
            <button class="upg-btn" id="btnUpgTire" onclick="window.upgrade('tire')">Tires Lvl 1 - $50</button>
        </div>

        <div class="vehicle-select">
            <button class="veh-btn active" id="selCar" onclick="window.selectVehicle('car')">Neon Car</button>
            <button class="veh-btn" id="selAuto" onclick="window.selectVehicle('auto')">BUET Auto</button>
        </div>

        <button onclick="window.initGame()">▶ START </button>
    </div>

    <div id="ui">
        <div id="stats">
            <div id="fuelContainer">
                <div id="fuelBar"></div>
                <div id="fuelText">FUEL</div>
            </div>
            <div id="distance" class="neon-text">Distance: 0m</div>
        </div>
        <div id="score" class="coin-text">Coins: <span id="runCoins">0</span></div>
    </div>

    <div id="mobileControls">
        <div id="btnBrake" class="control-btn">BRAKE</div>
        <div id="btnAccel" class="control-btn">GAS</div>
    </div>

    <div id="gameOverScreen" class="overlay-screen">
        <h1>GAME OVER</h1>
        <p id="reason" class="subtitle">You ran out of fuel!</p>
        <p class="coin-text" style="margin-bottom: 20px;">Earned: +<span id="earnedCoins">0</span> Coins</p>
        
        <button onclick="window.goHome()">GARAGE / UPGRADE</button>
        <button onclick="window.restartGame()" style="margin-bottom: 20px;">PLAY AGAIN</button>
        
        <div id="leaderboard">
            <h3>Top 10 Drivers</h3>
            <ul id="leaderboardList"></ul>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script type="module">
        // === FIREBASE SETUP ===
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, query, orderByChild, limitToLast, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0qkv3zCDzJ2Yopk_TUNn28y7HwcJLiZo",
            authDomain: "hillclimbracing-63f82.firebaseapp.com",
            databaseURL: "https://hillclimbracing-63f82-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "hillclimbracing-63f82",
            storageBucket: "hillclimbracing-63f82.firebasestorage.app",
            messagingSenderId: "871928296686",
            appId: "1:871928296686:web:e3c28a643219fb02cf6fff",
            measurementId: "G-GE03175QZF"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app); 

        // === VEHICLE SELECTION SYSTEM ===
        let selectedVehicle = 'car';
        const autoImage = new Image();
        autoImage.src = 'buetAuto.png'; 

        window.selectVehicle = function(type) {
            selectedVehicle = type;
            document.getElementById('selCar').classList.toggle('active', type === 'car');
            document.getElementById('selAuto').classList.toggle('active', type === 'auto');
        };

        // === UPGRADE & PROGRESS SYSTEM ===
        let currentPlayer = localStorage.getItem('hc_name') || "Guest";
        document.getElementById('playerName').value = currentPlayer === "Guest" ? "" : currentPlayer;

        let myCoins = parseInt(localStorage.getItem('hc_coins')) || 0;
        let upgEngine = parseInt(localStorage.getItem('hc_eng')) || 1;
        let upgFuel = parseInt(localStorage.getItem('hc_fuel')) || 1;
        let upgTire = parseInt(localStorage.getItem('hc_tire')) || 1;
        let currentRunCoins = 0;

        function updateGarageUI() {
            document.getElementById('totalCoins').innerText = myCoins;
            
            const engCost = upgEngine * 50;
            const btnEng = document.getElementById('btnUpgEngine');
            if(upgEngine >= 10) { btnEng.innerText = "Engine MAXED"; btnEng.disabled = true; }
            else { btnEng.innerText = `Engine Lvl ${upgEngine} - $${engCost}`; btnEng.disabled = (myCoins < engCost); }

            const fuelCost = upgFuel * 50;
            const btnFuel = document.getElementById('btnUpgFuel');
            if(upgFuel >= 10) { btnFuel.innerText = "Capacity MAXED"; btnFuel.disabled = true; }
            else { btnFuel.innerText = `Capacity Lvl ${upgFuel} - $${fuelCost}`; btnFuel.disabled = (myCoins < fuelCost); }

            const tireCost = upgTire * 50;
            const btnTire = document.getElementById('btnUpgTire');
            if(upgTire >= 10) { btnTire.innerText = "Tires MAXED"; btnTire.disabled = true; }
            else { btnTire.innerText = `Tires Lvl ${upgTire} - $${tireCost}`; btnTire.disabled = (myCoins < tireCost); }
        }

        window.upgrade = function(type) {
            let cost = 0;
            if (type === 'engine' && upgEngine < 10) cost = upgEngine * 50;
            if (type === 'fuel' && upgFuel < 10) cost = upgFuel * 50;
            if (type === 'tire' && upgTire < 10) cost = upgTire * 50;

            if (myCoins >= cost && cost > 0) {
                myCoins -= cost;
                if (type === 'engine') upgEngine++;
                if (type === 'fuel') upgFuel++;
                if (type === 'tire') upgTire++;
                
                localStorage.setItem('hc_coins', myCoins);
                localStorage.setItem('hc_eng', upgEngine);
                localStorage.setItem('hc_fuel', upgFuel);
                localStorage.setItem('hc_tire', upgTire);
                playPickupSound(); 
                updateGarageUI();
            }
        };

        updateGarageUI();

        async function saveAndShowLeaderboard(distance) {
            const list = document.getElementById('leaderboardList');
            list.innerHTML = '<li>Loading scores...</li>';
            try {
                const scoresRef = ref(db, 'leaderboard');
                await push(scoresRef, { name: currentPlayer, dist: distance, timestamp: Date.now() });

                const topScoresQuery = query(scoresRef, orderByChild('dist'), limitToLast(10));
                const snapshot = await get(topScoresQuery);
                
                list.innerHTML = '';
                if (snapshot.exists()) {
                    let scores = [];
                    snapshot.forEach((childSnapshot) => { scores.push(childSnapshot.val()); });
                    scores.sort((a, b) => b.dist - a.dist);
                    scores.forEach((data, index) => {
                        let li = document.createElement('li');
                        li.innerHTML = `${index + 1}. ${data.name} <span>${data.dist}m</span>`;
                        list.appendChild(li);
                    });
                } else { list.innerHTML = '<li>No scores yet!</li>'; }
            } catch (error) { list.innerHTML = '<li>Error loading leaderboard! Check rules.</li>'; }
        }

        // === AUDIO SYSTEM ===
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx, engineOsc, engineGain, engineFilter, bgmOsc, bgmGain;
        
        const autoMusic = new Audio('bgmusic.mp3');
        autoMusic.loop = true; 

        function setupAudio() {
            try {
                if (!audioCtx) audioCtx = new AudioContext();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                if (!bgmOsc) {
                    bgmOsc = audioCtx.createOscillator(); bgmOsc.type = 'sine'; bgmOsc.frequency.setValueAtTime(55, audioCtx.currentTime); 
                    bgmGain = audioCtx.createGain(); bgmGain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    bgmOsc.connect(bgmGain); bgmGain.connect(audioCtx.destination); bgmOsc.start();
                }
                if (!engineOsc) {
                    engineOsc = audioCtx.createOscillator(); engineOsc.type = 'square'; engineOsc.frequency.setValueAtTime(25, audioCtx.currentTime);
                    engineFilter = audioCtx.createBiquadFilter(); engineFilter.type = 'lowpass'; engineFilter.frequency.setValueAtTime(100, audioCtx.currentTime);
                    engineGain = audioCtx.createGain(); engineGain.gain.setValueAtTime(0, audioCtx.currentTime); 
                    engineOsc.connect(engineFilter); engineFilter.connect(engineGain); engineGain.connect(audioCtx.destination); engineOsc.start();
                }
            } catch (e) {}
        }

        function updateEngineSound(power, isDead) {
            if (!audioCtx || !engineGain || !engineOsc) return;

            if (selectedVehicle === 'auto') {
                engineGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                if (isDead) {
                    autoMusic.pause(); 
                } else if (autoMusic.paused && state === 'playing') {
                    autoMusic.play().catch(e => console.log("Audio Error:", e)); 
                }
                return; 
            } else {
                if (!autoMusic.paused) {
                    autoMusic.pause();
                    autoMusic.currentTime = 0;
                }
            }

            if (isDead) { engineGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); return; }
            if (power > 0) { 
                engineOsc.frequency.setTargetAtTime(60 + (upgEngine*2), audioCtx.currentTime, 0.1); 
                engineFilter.frequency.setTargetAtTime(300, audioCtx.currentTime, 0.1); 
                engineGain.gain.setTargetAtTime(0.4, audioCtx.currentTime, 0.1);
            } else if (power < 0) { 
                engineOsc.frequency.setTargetAtTime(35, audioCtx.currentTime, 0.1); 
                engineFilter.frequency.setTargetAtTime(150, audioCtx.currentTime, 0.1);
                engineGain.gain.setTargetAtTime(0.3, audioCtx.currentTime, 0.1);
            } else { 
                engineOsc.frequency.setTargetAtTime(25, audioCtx.currentTime, 0.2); 
                engineFilter.frequency.setTargetAtTime(80, audioCtx.currentTime, 0.2); 
                engineGain.gain.setTargetAtTime(0.2, audioCtx.currentTime, 0.2);
            }
        }

        function playPickupSound() {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1600, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } catch (e) {}
        }

        function playCrashSound() {
            if (!audioCtx) return;
            try {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } catch (e) {}
        }

        // === GAME SETUP & CANVAS ===
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        let keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true); 
        window.addEventListener('keyup', e => keys[e.code] = false);

        // === CONTROLS FIXED (Touch & Mouse) ===
        const btnBrake = document.getElementById('btnBrake');
        const btnAccel = document.getElementById('btnAccel');
        
        function handleInput(code, val) { 
            return (e) => { 
                if(e.type.startsWith('touch')) e.preventDefault(); 
                keys[code] = val; 
            } 
        }

        btnAccel.addEventListener('touchstart', handleInput('ArrowUp', true), {passive: false});
        btnAccel.addEventListener('touchend', handleInput('ArrowUp', false), {passive: false});
        btnAccel.addEventListener('mousedown', handleInput('ArrowUp', true));
        btnAccel.addEventListener('mouseup', handleInput('ArrowUp', false));
        btnAccel.addEventListener('mouseleave', handleInput('ArrowUp', false));

        btnBrake.addEventListener('touchstart', handleInput('ArrowDown', true), {passive: false});
        btnBrake.addEventListener('touchend', handleInput('ArrowDown', false), {passive: false});
        btnBrake.addEventListener('mousedown', handleInput('ArrowDown', true));
        btnBrake.addEventListener('mouseup', handleInput('ArrowDown', false));
        btnBrake.addEventListener('mouseleave', handleInput('ArrowDown', false));

        let state = 'start', cameraX = 0, cameraY = 0, maxDistance = 0;
        let particles = [], floatingTexts = [];
        let isLooping = false;

        // === CLASSES ===
        class FloatingText {
            constructor(x, y, text, color) {
                this.x = x; this.y = y; this.text = text; this.color = color;
                this.life = 1.0; this.vy = -1.5;
            }
            update() { this.y += this.vy; this.life -= 0.02; }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color; ctx.font = 'bold 20px Arial';
                ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                ctx.fillText(this.text, this.x, this.y);
                ctx.globalAlpha = 1.0; ctx.shadowBlur = 0;
            }
        }

        class DustParticle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = Math.random() * -2 - 1;
                this.life = 1.0; this.size = Math.random() * 5 + 3;
            }
            update() { this.x += this.vx; this.y += this.vy; this.size += 0.1; this.life -= 0.03; }
            draw(ctx) {
                ctx.fillStyle = `rgba(150, 100, 50, ${this.life * 0.5})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, radius) { this.x = x; this.y = y; this.oldX = x; this.oldY = y; this.radius = radius; }
            integrate(gravity, friction) {
                let vx = (this.x - this.oldX) * friction; let vy = (this.y - this.oldY) * friction;
                this.oldX = this.x; this.oldY = this.y; this.x += vx; this.y += vy + gravity;
            }
            constrain(terrain) {
                let groundY = terrain.getHeight(this.x); let isGrounded = false;
                if (this.y + this.radius > groundY) {
                    this.y = groundY - this.radius;
                    let vx = this.x - this.oldX; let vy = this.y - this.oldY;
                    this.oldX = this.x - vx * 0.95; 
                    if (vy > 0) this.oldY = this.y + vy * 0.3; 
                    isGrounded = true;
                }
                return isGrounded;
            }
        }

        class Car {
            constructor(x, y) {
                this.wheelBase = 70; this.wheelRadius = 16;
                this.p1 = new Particle(x - this.wheelBase / 2, y, this.wheelRadius); 
                this.p2 = new Particle(x + this.wheelBase / 2, y, this.wheelRadius); 
                this.fuel = 100; this.maxFuel = 100 + (upgFuel * 10);
                this.dead = false;
            }
            update(terrain) {
                if (this.dead) return;
                this.p1.integrate(0.6, 0.995); this.p2.integrate(0.6, 0.995);

                for (let i = 0; i < 3; i++) {
                    let dx = this.p2.x - this.p1.x; let dy = this.p2.y - this.p1.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    let diff = this.wheelBase - dist; let percent = diff / dist / 2;
                    let offsetX = dx * percent; let offsetY = dy * percent;

                    this.p1.x -= offsetX; this.p1.y -= offsetY;
                    this.p2.x += offsetX; this.p2.y += offsetY;
                    this.grounded1 = this.p1.constrain(terrain);
                    this.grounded2 = this.p2.constrain(terrain);
                }

                this.cx = (this.p1.x + this.p2.x) / 2; this.cy = (this.p1.y + this.p2.y) / 2;
                let dx = this.p2.x - this.p1.x; let dy = this.p2.y - this.p1.y;
                this.angle = Math.atan2(dy, dx);
                
                let idleDrain = 0.03 - (upgFuel * 0.001);
                this.fuel -= idleDrain; 
                let power = 0;

                if (this.fuel > 0) {
                    // FIX 1: Increased Base Power so the car doesn't get stuck easily
                    let maxPower = 1.5 + (upgEngine * 0.1); //change for car
                    
                    if (selectedVehicle === 'auto') {
                        maxPower *= 0.95; // change for auto
                    }

                    if (keys['ArrowUp']) power = maxPower;
                    if (keys['ArrowDown']) power = -1.2; // Increased braking/reverse power

                    if (power !== 0) {
                        this.fuel -= (0.05 - (upgFuel * 0.002)); 
                        
                        // FIX 2: Active Suspension Lift (Anti-stuck mechanism)
                        // This slightly lifts the car when applying gas, helping it clear sharp terrain edges
                        if (power > 0) {
                            this.p1.y -= 0.5;
                            this.p2.y -= 0.5;
                        }

                        if (this.grounded1 || this.grounded2) {
                            // FIX 3: Increased Grip multiplier for better hill climbing
                            let grip = 1.5 + (upgTire * 0.1); 
                            let fx = Math.cos(this.angle) * power * grip; 
                            let fy = Math.sin(this.angle) * power * grip;
                            this.p1.x += fx; this.p1.y += fy; this.p2.x += fx; this.p2.y += fy;
                            
                            if(Math.random() > 0.4) {
                                let wheelX = power > 0 ? this.p1.x : this.p2.x;
                                let wheelY = power > 0 ? this.p1.y + 10 : this.p2.y + 10;
                                particles.push(new DustParticle(wheelX, wheelY));
                            }
                        } else {
                            let torque = power * 0.015; // Increased air control
                            if (selectedVehicle === 'auto') {
                                torque *= 0.6; 
                            }
                            this.angle += torque;
                            this.p1.x = this.cx - Math.cos(this.angle) * (this.wheelBase / 2);
                            this.p1.y = this.cy - Math.sin(this.angle) * (this.wheelBase / 2);
                            this.p2.x = this.cx + Math.cos(this.angle) * (this.wheelBase / 2);
                            this.p2.y = this.cy + Math.sin(this.angle) * (this.wheelBase / 2);
                        }
                    }
                }

                updateEngineSound(power, this.dead);

                let nx = dy / this.wheelBase; let ny = -dx / this.wheelBase;
                let roofX = this.cx + nx * 30; let roofY = this.cy + ny * 30;

                let failString = selectedVehicle === 'auto' ? "Auto Flipped!" : "Car Flipped!";
                let powerFailString = selectedVehicle === 'auto' ? "Out of Battery!" : "Out of Fuel!";

                if (roofY > terrain.getHeight(roofX) - 5) this.die(failString);
                if (this.fuel <= 0 && !this.dead) this.die(powerFailString);
            }

            die(reason) {
                this.dead = true; this.fuel = 0;
                updateEngineSound(0, true); playCrashSound(); 
                state = 'gameover'; document.getElementById('reason').innerText = reason;
                document.getElementById('mobileControls').style.display = 'none'; 
                document.getElementById('gameOverScreen').style.display = 'flex'; 
                document.getElementById('earnedCoins').innerText = currentRunCoins;
                keys = {}; 
                saveAndShowLeaderboard(maxDistance);
            }

            draw(ctx) {
                ctx.save(); ctx.translate(this.cx, this.cy); ctx.rotate(this.angle);
                
                if (selectedVehicle === 'auto') {
                    if (autoImage.complete) {
                        ctx.drawImage(autoImage, -60, -60, 120, 90);
                    }
                } else {
                    ctx.shadowBlur = 15; ctx.shadowColor = '#ff0055'; ctx.fillStyle = '#ff0055';
                    ctx.beginPath(); ctx.roundRect(-45, -20, 90, 25, 8); ctx.fill();
                    ctx.fillStyle = '#111'; ctx.shadowColor = '#00ffcc';
                    ctx.beginPath(); ctx.roundRect(-20, -45, 50, 25, 10); ctx.fill();
                    ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 2; ctx.stroke();
                    ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(0, 255, 204, 0.15)';
                    ctx.beginPath(); ctx.moveTo(40, -10); ctx.lineTo(400, -50); ctx.lineTo(400, 100); ctx.fill();
                }
                ctx.restore();

                this.drawWheel(ctx, this.p1); this.drawWheel(ctx, this.p2);
            }

            drawWheel(ctx, p) {
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.x * 0.1);
                ctx.fillStyle = '#111'; ctx.shadowBlur = 10; ctx.shadowColor = '#00ffcc';
                ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.arc(0, 0, p.radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.shadowBlur = 0; ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(-p.radius, 0); ctx.lineTo(p.radius, 0);
                ctx.moveTo(0, -p.radius); ctx.lineTo(0, p.radius); ctx.stroke();
                ctx.restore();
            }
        }

        class Terrain {
            constructor() { this.seed = Math.random() * 10000; }
            getHeight(x) {
                let nx = x * 0.002; let y = 0;
                let diffMulti = 1.0 + (x * 0.00002); 
                y += Math.sin(nx + this.seed) * 200 * diffMulti; 
                y += Math.sin(nx * 2.3 + this.seed) * 100 * diffMulti;
                y += Math.sin(nx * 5.1 + this.seed) * 40; 
                y += Math.sin(nx * 10.5 + this.seed) * 15;
                return 400 - y; 
            }
            draw(ctx, camX, screenW, screenH) {
                let startX = camX - screenW / 2 - 50; let endX = camX + screenW / 2 + 50;
                ctx.fillStyle = '#0a0a0a'; ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 4;
                ctx.shadowBlur = 15; ctx.shadowColor = '#00ffcc';
                ctx.beginPath(); ctx.moveTo(startX, screenH + 500); 
                for (let x = startX; x <= endX; x += 20) ctx.lineTo(x, this.getHeight(x));
                ctx.lineTo(endX, screenH + 500); ctx.fill(); ctx.stroke(); ctx.shadowBlur = 0; 
            }
        }

        class Item {
            constructor(x, terrain) {
                this.x = x; this.y = terrain.getHeight(x) - 40; 
                this.collected = false; this.bobOffset = Math.random() * Math.PI * 2;
                this.type = Math.random() > 0.3 ? 'coin' : 'fuel';
            }
            update(car) {
                if (this.collected) return;
                let dx = this.x - car.cx; let dy = this.y - car.cy;
                if (dx * dx + dy * dy < 3000) { 
                    this.collected = true; 
                    playPickupSound(); 
                    if(this.type === 'fuel') {
                        car.fuel = Math.min(car.maxFuel, car.fuel + 40);
                        let pickupStr = selectedVehicle === 'auto' ? "+BATTERY" : "+FUEL";
                        floatingTexts.push(new FloatingText(this.x, this.y, pickupStr, "#ff0055"));
                    } else {
                        let coinValue = Math.floor(Math.random() * 5) + 5; 
                        currentRunCoins += coinValue;
                        myCoins += coinValue;
                        localStorage.setItem('hc_coins', myCoins);
                        floatingTexts.push(new FloatingText(this.x, this.y, "+$" + coinValue, "#ffeb3b"));
                    }
                }
            }
            draw(ctx, time) {
                if (this.collected) return;
                let bobY = this.y + Math.sin(time * 0.005 + this.bobOffset) * 10;
                
                if(this.type === 'coin') {
                    ctx.shadowBlur = 20; ctx.shadowColor = '#ffeb3b'; ctx.fillStyle = '#ffeb3b';
                    ctx.beginPath(); ctx.arc(this.x, bobY, 12, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#000'; ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle'; ctx.fillText('$', this.x, bobY);
                } else {
                    ctx.shadowBlur = 20; ctx.shadowColor = '#ff0055'; ctx.fillStyle = '#ff0055';
                    ctx.beginPath(); ctx.rect(this.x - 10, bobY - 12, 20, 24); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle'; ctx.fillText(selectedVehicle === 'auto' ? '⚡' : 'F', this.x, bobY);
                }
                ctx.shadowBlur = 0;
            }
        }

        // === MAIN LOOP ===
        let terrain, car, items = [];
        let lastChunk = -1, time = 0;

        window.initGame = function() {
            let inputVal = document.getElementById('playerName').value.trim();
            currentPlayer = inputVal !== "" ? inputVal : "Guest";
            localStorage.setItem('hc_name', currentPlayer);

            setupAudio(); 
            document.getElementById('startScreen').style.display = 'none'; 
            document.getElementById('ui').style.display = 'flex';
            
            window.restartGame(); 
            
            if (!isLooping) {
                isLooping = true;
                requestAnimationFrame(loop);
            }
        };

        window.goHome = function() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('ui').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
            updateGarageUI();
            state = 'start';
            
            autoMusic.pause();
            autoMusic.currentTime = 0;
        };

        window.restartGame = function() {
            terrain = new Terrain();
            car = new Car(0, terrain.getHeight(0) - 100);
            items = []; particles = []; floatingTexts = [];
            lastChunk = -1; maxDistance = 0; currentRunCoins = 0; cameraX = 0; cameraY = 0; 
            state = 'playing'; 
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('ui').style.display = 'flex';
            document.getElementById('mobileControls').style.display = 'flex'; 
        };

        function spawnItems() {
            let chunk = Math.floor(car.cx / 600); 
            if (chunk > lastChunk) {
                lastChunk = chunk;
                let numItems = Math.random() > 0.4 ? 2 : 1;
                for (let i = 0; i < numItems; i++) {
                    let spawnX = chunk * 600 + Math.random() * 500 + 300; 
                    items.push(new Item(spawnX, terrain));
                }
                items = items.filter(p => p.x > car.cx - window.innerWidth);
            }
        }

        function updateUI() {
            let fuelPct = Math.max(0, (car.fuel / car.maxFuel) * 100);
            let fuelBar = document.getElementById('fuelBar');
            let fuelText = document.getElementById('fuelText');

            fuelBar.style.width = fuelPct + '%';
            
            if (selectedVehicle === 'auto') {
                fuelText.innerText = "BATTERY";
                if (fuelPct < 20) { fuelBar.style.backgroundColor = '#ff0055'; fuelBar.style.boxShadow = '0 0 15px #ff0055'; }
                else if (fuelPct < 50) { fuelBar.style.backgroundColor = '#00aaff'; fuelBar.style.boxShadow = '0 0 15px #00aaff'; }
                else { fuelBar.style.backgroundColor = '#00ffcc'; fuelBar.style.boxShadow = '0 0 15px #00ffcc'; }
            } else {
                fuelText.innerText = "FUEL";
                if (fuelPct < 20) { fuelBar.style.backgroundColor = '#ff0055'; fuelBar.style.boxShadow = '0 0 15px #ff0055'; }
                else if (fuelPct < 50) { fuelBar.style.backgroundColor = '#ffeb3b'; fuelBar.style.boxShadow = '0 0 15px #ffeb3b'; }
                else { fuelBar.style.backgroundColor = '#00ffcc'; fuelBar.style.boxShadow = '0 0 15px #00ffcc'; }
            }
            
            let dist = Math.floor(car.cx / 10); maxDistance = Math.max(maxDistance, dist);
            document.getElementById('distance').innerText = 'Distance: ' + maxDistance + 'm'; 
            document.getElementById('runCoins').innerText = currentRunCoins;
        }

        function loop(timestamp) {
            time = timestamp;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (state === 'playing') { car.update(terrain); spawnItems(); }

            let targetCamX = (state === 'playing') ? car.cx + canvas.width * 0.2 : car.cx; 
            let targetCamY = (state === 'playing') ? car.cy - canvas.height * 0.1 : car.cy;
            cameraX += (targetCamX - cameraX) * 0.1; cameraY += (targetCamY - cameraY) * 0.1;

            ctx.fillStyle = 'rgba(0, 255, 204, 0.05)';
            for (let i = 0; i < 50; i++) {
                let px = (cameraX * 0.2 + i * 150) % canvas.width;
                let py = (cameraY * 0.2 + (i * 73) % canvas.height) % canvas.height;
                ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI * 2); ctx.fill();
            }

            ctx.save(); ctx.translate(canvas.width / 2 - cameraX, canvas.height / 2 - cameraY);

            for (let item of items) { if (state === 'playing') item.update(car); item.draw(ctx, time); }
            
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; if (state === 'playing') p.update(); 
                p.draw(ctx); if (p.life <= 0) particles.splice(i, 1);
            }
            
            if (state === 'playing' || state === 'gameover') car.draw(ctx); 
            terrain.draw(ctx, cameraX, canvas.width, canvas.height);

            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i]; if (state === 'playing') ft.update();
                ft.draw(ctx); if (ft.life <= 0) floatingTexts.splice(i, 1);
            }

            ctx.restore(); 
            if(state === 'playing') updateUI(); 
            requestAnimationFrame(loop);
        }
    </script>
